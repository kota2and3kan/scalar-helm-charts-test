name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  check-chart:
    runs-on: ubuntu-latest
    outputs:
      chart_name: ${{ steps.list-changed.outputs.chart_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check if only one chart changed
        id: list-changed
        run: |
          changed="$(ct list-changed --config .github/ci/common/ct.yaml)"
          if [[ -n "$changed" ]]; then
            num_changed="$(printf '%s\n' "$changed" | wc -l | tr -d ' ')"
            if [ "$num_changed" -gt 1 ]; then
              echo "More than one chart changed (count=$num_changed). Failing."
              printf '%s\n' "$changed"
              exit 1
            fi
            echo "Only one chart changed (count=$num_changed). Proceeding."
            echo "chart_name=${changed//$'\n'/ }" >> "$GITHUB_OUTPUT"
          fi

  common-test:
    runs-on: ubuntu-latest
    needs: check-chart
    steps:
      - run: echo "Running common tests"

  scalardb-cluster-test:
    needs: common-test
    if: ${{ needs.check-chart.outputs.chart_name == 'charts/scalardb-cluster' }}
    uses: ./.github/workflows/ci/scalardb-cluster.yaml

  scalardl-test:
    needs: common-test
    if: ${{ needs.check-chart.outputs.chart_name == 'charts/scalardl' }}
    uses: ./.github/workflows/ci/scalardl.yaml

  scalardl-audit-test:
    needs: common-test
    if: ${{ needs.check-chart.outputs.chart_name == 'charts/scalardl-audit' }}
    uses: ./.github/workflows/ci/scalardl-audit.yaml
